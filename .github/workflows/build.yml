name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      buildType:
        type: choice
        description: "Build type to run"
        options:
          - prod-apk

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install EAS CLI
        run: bun add -g eas-cli@latest

      - name: Run TypeScript Check
        run: bun tsc --noEmit
        continue-on-error: false

      - name: Bump Version & Code
        id: bump-version
        run: |
          node -e "
            const fs = require('fs');

            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const versionParts = pkg.version.split('.').map(Number);
            versionParts[2] += 1;
            const newVersion = versionParts.join('.');
            pkg.version = newVersion;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');

            const app = JSON.parse(fs.readFileSync('./app.json', 'utf8'));
            app.expo.version = newVersion;
            if (app.expo.android) {
              app.expo.android.versionCode = (app.expo.android.versionCode || 0) + 1;
            }
            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2) + '\n');

            console.log('BUMPED_VERSION=' + newVersion);
          " >> $GITHUB_ENV

          VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Commit Version Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.json
          git commit -m "chore: bump version to v${{ steps.bump-version.outputs.version }} [skip ci]"
          git push

      - name: Build Production APK
        run: eas build --platform android --profile production-apk --local --non-interactive --output=./app-prod.apk
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          NODE_ENV: production

      - name: Generate Changelog
        id: changelog
        run: |
          if git describe --tags --abbrev=0 > /dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            git log $LAST_TAG..HEAD --pretty=format:"- %s" > changelog.md
          else
            git log --pretty=format:"- %s" -n 10 > changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release v${{ steps.bump-version.outputs.version }} (${{ steps.bump-version.outputs.build_number }})"
          tag_name: "v${{ steps.bump-version.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            ./app-prod.apk
          body_path: changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaamah-apk-v${{ steps.bump-version.outputs.version }}-${{ steps.bump-version.outputs.build_number }}
          path: ./app-prod.apk
          retention-days: 7
